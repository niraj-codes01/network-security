<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Security Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:linear-gradient(135deg,#4facfe,#00c6fb);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
}

.card{

    width:550px;
    border:none;
    border-radius:20px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{

    text-align:center;
    margin-bottom:25px;
    color:#0d6efd;
    font-weight:bold;
}

.btn{

    width:100%;
}

</style>

</head>

<body>

<div class="card">

<h1>🛡 Network Security Prediction</h1>

<form action="/predict" method="post" enctype="multipart/form-data">

<div class="mb-4">

<label class="form-label">
Upload CSV File
</label>

<input
class="form-control"
type="file"
name="file"
required>

</div>

<button class="btn btn-primary btn-lg">

Predict

</button>

</form>

</div>

</body>
</html>
