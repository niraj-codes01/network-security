<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Result</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
    --bg-0:#0a0e14;
    --bg-1:#111722;
    --bg-2:#161e2c;
    --line:#243044;
    --cyan:#3ddcff;
    --green:#34e0a1;
    --text:#d9e3ef;
    --muted:#7387a3;
}

*{
    box-sizing:border-box;
}

body{
    background:
        radial-gradient(circle at 15% 0%, rgba(61,220,255,.07), transparent 45%),
        radial-gradient(circle at 85% 100%, rgba(52,224,161,.06), transparent 45%),
        var(--bg-0);
    min-height:100vh;
    font-family:'Inter',Arial,sans-serif;
    color:var(--text);
    padding:48px 24px;
}

.container{
    max-width:920px;
    margin:0 auto;
    background:linear-gradient(180deg,var(--bg-1),var(--bg-2));
    border:1px solid var(--line);
    border-radius:18px;
    padding:38px;
    box-shadow:0 25px 60px rgba(0,0,0,.55);
}

.eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:.72rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--green);
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:6px;
}

.eyebrow .dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--green);
    box-shadow:0 0 8px var(--green);
}

h2{
    font-family:'JetBrains Mono',monospace;
    font-weight:700;
    color:#fff;
    margin-bottom:6px;
    letter-spacing:-.01em;
}

.subtitle{
    color:var(--muted);
    font-size:.9rem;
    margin-bottom:28px;
}

.table-responsive{
    border:1px solid var(--line);
    border-radius:12px;
    overflow:hidden;
}

table{
    width:100%!important;
    margin-bottom:0!important;
    font-family:'JetBrains Mono',monospace;
    font-size:.85rem;
    color:var(--text);
    border-collapse:collapse;
}

table thead th{
    background:var(--bg-0);
    color:var(--cyan);
    text-transform:uppercase;
    letter-spacing:.05em;
    font-size:.72rem;
    font-weight:600;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
}

table tbody td{
    padding:10px 14px;
    border-top:1px solid var(--line);
    background:transparent;
}

table tbody tr:nth-child(even) td{
    background:rgba(255,255,255,.02);
}

table tbody tr:hover td{
    background:rgba(61,220,255,.06);
}

.actions{
    display:flex;
    justify-content:flex-end;
    margin-top:26px;
}

.btn-scan{
    background:linear-gradient(135deg,var(--cyan),var(--green));
    border:none;
    color:#06121a;
    font-weight:600;
    font-family:'JetBrains Mono',monospace;
    letter-spacing:.04em;
    padding:11px 22px;
    border-radius:10px;
    transition:transform .15s ease, box-shadow .15s ease;
    text-decoration:none;
    display:inline-block;
}

.btn-scan:hover{
    transform:translateY(-1px);
    box-shadow:0 10px 25px rgba(61,220,255,.25);
    color:#06121a;
}

</style>

</head>

<body>

<div class="container">

<div class="eyebrow"><span class="dot"></span>Scan Complete</div>
<h2>Prediction Results</h2>
<p class="subtitle">Each row reflects the model's classification for one record in the uploaded file.</p>

<div class="table-responsive">
{{ table|safe }}
</div>

<div class="actions">
<a href="/" class="btn-scan">Predict Another File</a>
</div>

</div>

</body>
</html>
